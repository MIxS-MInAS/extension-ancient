---
site_name: "MIxS-MInAS Ancient DNA Extension"
theme:
  name: material
  # palette:
  #  scheme: slate
  #  primary: cyan
  features:
    - content.tabs.link
    - search.suggest
  font:
    text: Albert Sans
  logo: assets/images/logos/minas-logo-rectangle-monochrome.png
  favicon: assets/images/logos/minas-favicon.png
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default

      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
plugins:
  - search:
      separator: '[\s\-\:\(\)]+'
  - mermaid2
markdown_extensions:
  - tables
  - pymdownx.magiclink
  - pymdownx.details
  - admonition
extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js
nav:
  - Home: index.md
  # - Index: index.md
  #- Full term table: term_list.md
  #- Combinations: combinations.md
  #- Enumerations: enumerations.md
site_url: https://mixs-minas.org/extension-ancient
repo_url: https://github.com/mixs-minas/extension-ancient

docs_dir: docs
# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
