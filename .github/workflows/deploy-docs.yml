---
name: LinkML mkdocs deploy GitHub Action
on:
    push:
        branches:
            - main
    workflow_dispatch: # This allows manual triggering

jobs:
    deploy-docs:
        name: Deploy docs
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            # Fixed: Specify exact Python version instead of using undefined matrix variable
            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install conda
              uses: conda-incubator/setup-miniconda@v3
              with:
                  auto-update-conda: true
                  python-version: "3.10"
                  environment-file: environment.yaml
                  activate-environment: mixs-minas-extension-ancient
                  miniforge-version: latest

            # Run the LinkML linting command
            - name: Run LinkML Linting
              shell: bash -el {0}
              run: |
                  touch docs/.nojekyll
                  linkml generate doc src/mixs/schema/ancient.yml -d docs/ --template-directory src/docs-template/ -v
                  mkdocs build -d site

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./site
                  publish_branch: gh-pages
